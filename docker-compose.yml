# TournamentTracker — self‑host with one command
# Storage is in-memory by default; data resets when the container restarts.
# For persistent storage, a Postgres-backed storage layer would need to be implemented.

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Required in production: set a long random secret for sessions
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
    restart: unless-stopped

